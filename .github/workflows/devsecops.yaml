name: DevSecOps Pipeline

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"

jobs:
  notify-start:
    name: Notify Start
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Send Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: DevSecOps Pipeline
          SLACK_MESSAGE: |
            Event: ${{ github.event_name }}
            Actor: ${{ github.actor }}
            Branch: ${{ github.ref_name }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MSG_MINIMAL: true

  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  sca:
    name: Software Composition Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit
        shell: bash
        run: |
          set +e
          npm audit --audit-level=high --omit=dev --json > npm-audit-report.json
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload SCA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json

      - name: Fail on vulnerable dependencies
        if: steps.audit.outputs.exit_code != '0'
        run: |
          echo "npm audit found high or critical vulnerabilities."
          exit 1

  sast:
    name: SAST Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config p/security-audit --error --sarif --output semgrep.sarif .

      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep.sarif
          if-no-files-found: ignore

  notify-finish:
    name: Notify Result
    runs-on: ubuntu-latest
    if: ${{ always() }}
    continue-on-error: true
    needs:
      - lint
      - build
      - sca
      - sast
    steps:
      - name: Send Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ needs.lint.result == 'success' && needs.build.result == 'success' && needs.sca.result == 'success' && needs.sast.result == 'success' && 'good' || 'danger' }}
          SLACK_MESSAGE: |
            DevSecOps pipeline status: ${{ needs.lint.result == 'success' && needs.build.result == 'success' && needs.sca.result == 'success' && needs.sast.result == 'success' && 'passed' || 'failed' }}
            Actor: ${{ github.actor }}
            Branch: ${{ github.ref_name }}
            Reports: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MSG_MINIMAL: true
